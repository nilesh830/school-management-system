<div class="sms-layout">
  <!-- Sidebar -->
  <aside class="sms-sidebar">
    <div class="sms-sidebar-brand">
      <div class="flex align-items-center gap-2">
        <i class="pi pi-book text-primary text-xl"></i>
        <div>
          <div class="brand-title">SMS Admin</div>
          <div class="brand-subtitle">School Management</div>
        </div>
      </div>
    </div>

    <nav class="flex flex-column gap-1 p-3 flex-1">
      @for (item of navItems; track item.label) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="sms-nav-link"
        >
          <i class="pi {{ item.icon }} text-sm"></i>
          <span class="text-sm">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sms-sidebar-footer">
      <div class="flex align-items-center gap-2">
        <p-avatar [label]="initials" styleClass="bg-primary-600 text-white font-bold" size="normal" shape="circle" />
        <div class="flex flex-column min-w-0 flex-1">
          <span class="text-white text-sm font-medium white-space-nowrap overflow-hidden text-overflow-ellipsis">{{ fullName }}</span>
          <span style="color: rgba(255,255,255,0.5); font-size: 0.7rem">Administrator</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="sms-main">
    <!-- Top bar -->
    <header class="sms-topbar">
      <div class="flex-1">
        <span class="text-600 text-sm">School Management System</span>
      </div>
      <p-menu #profileMenu [model]="profileMenuItems" [popup]="true" appendTo="body" />
      <p-button
        [label]="fullName"
        icon="pi pi-user"
        severity="secondary"
        [text]="true"
        size="small"
        (onClick)="profileMenu.toggle($event)"
      />
      <p-button
        icon="pi pi-sign-out"
        severity="secondary"
        [text]="true"
        size="small"
        pTooltip="Sign Out"
        (onClick)="auth.logout()"
      />
    </header>

    <!-- Page content -->
    <main class="sms-content">
      <router-outlet />
    </main>
  </div>
</div>
