[flake8]
max-line-length = 120
# E203 / W503 conflict with black's formatting; ignore per black's guidance.
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    venv,
    migrations,
# Package __init__.py files intentionally re-export symbols (F401 is expected).
per-file-ignores =
    __init__.py: F401
